spring:
  application:
    name: ms-usuarioseguridad
  datasource:
    url: jdbc:mysql://localhost:3306/db_ecomarket
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: false        # ← soluciona el error

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true