spring.application.name=MicroUsuarioSeguridad
server.port=8083

# Base de datos MySQL - XAMPP
spring.datasource.url=jdbc:mysql://localhost:3306/db_ecomarket
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate - validate porque Flyway crea las tablas
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway - migraciones en src/main/resources/db/migration
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Basic Auth
spring.security.user.name=admin
spring.security.user.password=admin123

# Logs
logging.level.root=INFO
logging.level.com.example.MicroEnvio=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
