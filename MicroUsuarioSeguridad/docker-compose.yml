services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: db_ecomarket
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1","-uroot","-proot123"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
  ms-producto:
    build: ./MicroUsuarioSeguridad
    ports:
      - "8083:8081"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/db_ecomarket?allowPublicKeyRetrieval=true&useSSL=false"
      SPRING_DATASOURCE_USERNAME: "admin"
      SPRING_DATASOURCE_PASSWORD: "admin123"
      SPRING_PROFILES_ACTIVE: "docker"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
      EUREKA_CLIENT_ENABLED: "false"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
